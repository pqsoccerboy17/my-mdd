name: Changelog Sync

on:
  schedule:
    - cron: '0 6 * * *' # midnight CST daily
  workflow_dispatch: # manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout my-mdd
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MDD_GITHUB_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run changelog sync
        env:
          GITHUB_TOKEN: ${{ secrets.MDD_GITHUB_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MDD_REPO: pqsoccerboy17/MDD
        run: node scripts/changelog-sync.mjs

      - name: Commit and push if changed
        run: |
          if ! git diff --quiet src/data/changelog-sync.json 2>/dev/null; then
            git config user.name "changelog-sync[bot]"
            git config user.email "changelog-sync[bot]@users.noreply.github.com"
            git add src/data/changelog-sync.json
            git commit -m "chore(changelog-sync): update changelog from MDD HQ

          Co-Authored-By: Claude Sonnet 4 <noreply@anthropic.com>"
            git push
            echo "Changelog updated and pushed."
          else
            echo "No changelog changes to commit."
          fi
